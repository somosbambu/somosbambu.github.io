<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Bambú</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: url('bambubackgroundlandpage.jpg') no-repeat center center fixed;
      background-size: cover;
      font-family: Arial, sans-serif;
    }

    .overlay {
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: rgba(0, 0, 0, 0.3);
    }

    .boton-bambu {
      padding: 20px 50px;
      font-size: 28px;
      background-color: #ffffffcc;
      border: none;
      border-radius: 10px;
      color: #2d2d2d;
      cursor: pointer;
      text-decoration: none;
      transition: background-color 0.3s, transform 0.3s;
    }

    .boton-bambu:hover {
      background-color: #ffffffee;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="overlay">
    <a class="boton-bambu" href="https://somosbambu.carrd.co/">Bambú</a>
  </div>
</body>
</html>
